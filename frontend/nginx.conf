server {
    listen       80;
    server_name  localhost;



    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;

        try_files $uri $uri/ /index.html;
    }


    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }

    location /api/ {
        proxy_pass https://timelog-backend.internal.agreeablesea-IDRANDOM.spaincentral.azurecontainerapps.io;
        # Ensure we use HTTP/1.1 when proxying so Upgrade header is honored (WebSocket support)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        # Send the backend hostname as the Host header so TLS SNI and cert checks match
        proxy_set_header Host timelog-backend.internal.agreeablesea-IDRANDOM.spaincentral.azurecontainerapps.io;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Enable SNI (server name indication) so the upstream TLS handshake uses the correct name
        proxy_ssl_server_name on;
        proxy_ssl_name timelog-backend.internal.agreeablesea-IDRANDOM.spaincentral.azurecontainerapps.io;
        proxy_ssl_protocols TLSv1.2 TLSv1.3;
        proxy_ssl_session_reuse on;

        # If the upstream certificate is not trusted by Windows/nginx CA bundle while testing,
        # you can temporarily disable verification. For production, remove this line and
        # configure a proper trusted CA bundle using proxy_ssl_trusted_certificate.
        # proxy_ssl_verify off;
    }

}



