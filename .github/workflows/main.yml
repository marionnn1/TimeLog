on:
  push:
    branches:
    - main
name: TimeLog-Deploy

jobs:
    build-and-deploy:
        runs-on: ubuntu-latest
        steps:
        # checkout the repo
        - name: 'Checkout GitHub Action'
          uses: actions/checkout@main
        - name: 'Build and push image'
          uses: azure/docker-login@v1
          with:
            login-server: ${{ secrets.REGISTRY_LOGIN_SERVER }}
            username: ${{ secrets.REGISTRY_USERNAME }}
            password: ${{ secrets.REGISTRY_PASSWORD }}
        - run: |
            docker build . -t ${{ secrets.REGISTRY_LOGIN_SERVER }}/timelog-backend:${{ github.sha }} -f ./backend/Dockerfile
            docker push ${{ secrets.REGISTRY_LOGIN_SERVER }}/timelog-backend:${{ github.sha }}

        - run: |
            docker build . -t ${{ secrets.REGISTRY_LOGIN_SERVER }}/timelog-frontend:${{ github.sha }} -f ./frontend/Dockerfile
            docker push ${{ secrets.REGISTRY_LOGIN_SERVER }}/timelog-frontend:${{ github.sha }}
